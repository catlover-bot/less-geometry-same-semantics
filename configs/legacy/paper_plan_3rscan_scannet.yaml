# Paper-oriented experiment plan.
#
# 3RScan + 3DSSG is the primary benchmark. ScanNet is supplementary evidence
# for transfer/supporting analysis. The plan intentionally names expected
# artifacts so audits can check paper-readiness without guessing.

paper:
  title: "Less Geometry, Same Semantics"
  claim_scope: "Semantics-preserving 3D scene understanding under aggressive degradation"
  output_dir: outputs/paper_package

datasets:
  primary:
    name: 3rscan_3dssg
    role: main_real_world_benchmark
    config: configs/3rscan_3dssg.yaml
  secondary:
    name: scannet
    role: supplementary_transfer_support
    config: configs/scannet.yaml

runs:
  seeds: [7, 13, 29]
  epochs: 1
  smoke_max_cases: null

main_benchmark:
  output: primary_main/results.json
  artifacts_dir: primary_main
  expected_conditions:
    corruption: [clean, severe_corruption]
    point_budget: [raw, compressed]
    graph: [no_graph, simple_graph]
    constrained: [false, true]
    adaptation: [none, input_normalization]

severity_benchmark:
  output: primary_severity/results.json
  artifacts_dir: primary_severity
  expected_presets:
    - clean
    - mild_corruption
    - medium_corruption
    - severe_corruption
    - extreme_compression

ablations:
  output: primary_ablations/results.json
  artifacts_dir: primary_ablations
  expected_groups:
    - graph_no_graph
    - graph_simple_graph
    - graph_richer_graph
    - graph_graph_with_relation_dropout
    - graph_graph_with_noisy_edges
    - compressed_input
    - raw_input
    - constrained_output
    - unconstrained_output

supplementary:
  run_scannet: true
  output: secondary_scannet/results.json
  artifacts_dir: secondary_scannet

paper_artifacts:
  figures_dir: figures
  tables_dir: tables
  claims_dir: claims
  audit_dir: audit
  support_dir: paper_support
